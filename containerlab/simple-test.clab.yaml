name: drift-simple-test

topology:
  nodes:
    cli:
      kind: linux
      image: localhost:5000/drift:dev
      entrypoint: /bin/sh
      cmd: -c "sleep infinity"

    agent1:
      kind: linux
      image: localhost:5000/drift:dev
      cmd: agent start --adoptable --port 5000 --id agentid_test1
      ports:
        - "5001:5000"

    target1:
      kind: linux
      image: alpine:latest
      entrypoint: /bin/sh
      cmd: -c "sleep infinity"
